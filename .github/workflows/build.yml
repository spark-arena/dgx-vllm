name: Build and Push DGX vLLM Containers

on:
  schedule:
    - cron: "30 * * * *"  # Every hour at :30 — polls upstream for changes
  workflow_dispatch:          # Manual trigger (always forces build)

env:
  IMAGE_BASE: ghcr.io/spark-arena/dgx-vllm-eugr

concurrency:
  group: build
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Job 1: Check upstream for changes (lightweight, runs on every trigger)
  # ──────────────────────────────────────────────────────────────────────
  check-upstream:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.compare.outputs.changed }}
      main_sha: ${{ steps.fetch.outputs.main_sha }}
      latest_release: ${{ steps.fetch.outputs.latest_release }}
      known_tags: ${{ steps.fetch.outputs.known_tags }}
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Read stored upstream state
        id: stored
        run: |
          echo "main_sha=$(jq -r '.main_sha' upstream-state.json)" >> "$GITHUB_OUTPUT"
          echo "latest_release=$(jq -r '.latest_release' upstream-state.json)" >> "$GITHUB_OUTPUT"
          echo "known_tags=$(jq -c '.known_tags' upstream-state.json)" >> "$GITHUB_OUTPUT"

      - name: Fetch current upstream state
        id: fetch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Main branch HEAD SHA
          MAIN_SHA=$(gh api repos/eugr/spark-vllm-docker/git/ref/heads/main --jq '.object.sha' 2>/dev/null || echo "")
          echo "main_sha=${MAIN_SHA}" >> "$GITHUB_OUTPUT"

          # Latest release tag
          LATEST_RELEASE=$(gh api repos/eugr/spark-vllm-docker/releases/latest --jq '.tag_name' 2>/dev/null || echo "")
          echo "latest_release=${LATEST_RELEASE}" >> "$GITHUB_OUTPUT"

          # All tags (as JSON array)
          KNOWN_TAGS=$(gh api repos/eugr/spark-vllm-docker/tags --paginate --jq '[.[].name]' 2>/dev/null || echo "[]")
          echo "known_tags=${KNOWN_TAGS}" >> "$GITHUB_OUTPUT"

      - name: Compare states
        id: compare
        run: |
          CHANGED="false"

          # workflow_dispatch always forces a build
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CHANGED="true"
            echo "Forced build via workflow_dispatch"
          fi

          # Check main SHA
          if [ "${{ steps.stored.outputs.main_sha }}" != "${{ steps.fetch.outputs.main_sha }}" ]; then
            CHANGED="true"
            echo "Main SHA changed: ${{ steps.stored.outputs.main_sha }} -> ${{ steps.fetch.outputs.main_sha }}"
          fi

          # Check latest release
          if [ "${{ steps.stored.outputs.latest_release }}" != "${{ steps.fetch.outputs.latest_release }}" ]; then
            CHANGED="true"
            echo "Latest release changed: ${{ steps.stored.outputs.latest_release }} -> ${{ steps.fetch.outputs.latest_release }}"
          fi

          # Check tags
          if [ '${{ steps.stored.outputs.known_tags }}' != '${{ steps.fetch.outputs.known_tags }}' ]; then
            CHANGED="true"
            echo "Tags changed"
          fi

          echo "changed=${CHANGED}" >> "$GITHUB_OUTPUT"
          echo "Result: changed=${CHANGED}"

  # ──────────────────────────────────────────────────────────────────────
  # Job 2: Compute the next YYYYMMDDNN tag
  # ──────────────────────────────────────────────────────────────────────
  compute-tag:
    runs-on: ubuntu-latest
    needs: check-upstream
    if: needs.check-upstream.outputs.changed == 'true'
    outputs:
      tag: ${{ steps.compute.outputs.tag }}
      date_tag: ${{ steps.compute.outputs.date_tag }}
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Compute next tag
        id: compute
        run: |
          TODAY=$(TZ=US/Pacific date +%Y%m%d)
          LAST=$(cat sequence.txt | tr -d '[:space:]')
          LAST_DATE=${LAST:0:8}
          LAST_NN=${LAST:8:2}

          if [ "$LAST_DATE" = "$TODAY" ]; then
            NEXT_NN=$(printf '%02d' $((10#$LAST_NN + 1)))
          else
            NEXT_NN="01"
          fi

          TAG="${TODAY}${NEXT_NN}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "date_tag=${TODAY}" >> "$GITHUB_OUTPUT"
          echo "Next tag: ${TAG}"

  # ──────────────────────────────────────────────────────────────────────
  # Job 3: Build each variant (sequential to manage disk space)
  # ──────────────────────────────────────────────────────────────────────
  build-variant:
    runs-on: ubuntu-24.04-arm
    needs: compute-tag
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - name: nightly
            suffix: ""
            build_flags: "-j 2"
          - name: nightly-tf5
            suffix: "-tf5"
            build_flags: "-j 2 --tf5"
    #          - name: nightly-mxfp4
    #            suffix: "-mxfp4"
    #            build_flags: "--exp-mxfp4"
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /usr/share/swift /opt/hostedtoolcache
          sudo docker system prune -af
          df -h /

      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Clone spark-vllm-docker
        run: |
          git clone --depth 1 https://github.com/eugr/spark-vllm-docker.git /tmp/spark-vllm-docker

      - name: Detect upstream base image
        id: base
        run: |
          # Extract the first FROM image from the upstream Dockerfile
          BASE_IMAGE=$(grep -m1 '^FROM ' /tmp/spark-vllm-docker/Dockerfile | awk '{print $2}')
          echo "image=${BASE_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "Detected base image: ${BASE_IMAGE}"

      - name: Build vllm-node image
        run: |
          cd /tmp/spark-vllm-docker
          bash build-and-copy.sh --tag vllm-node ${{ matrix.build_flags }}
        timeout-minutes: 120

      - name: Extract build metadata from vllm-node
        id: metadata
        run: |
          # Extract build-metadata.yaml from the freshly built image
          RAW=$(docker run --rm vllm-node cat /workspace/build-metadata.yaml 2>/dev/null || echo "")
          if [ -z "$RAW" ]; then
            echo "WARNING: No build-metadata.yaml found in vllm-node"
            echo "repo_commit=" >> "$GITHUB_OUTPUT"
            echo "vllm_hash=" >> "$GITHUB_OUTPUT"
            echo "flashinfer_hash=" >> "$GITHUB_OUTPUT"
          else
            # Parse YAML fields with grep+sed (no yq dependency needed)
            REPO_COMMIT=$(echo "$RAW" | grep -E '^\s*build_script_commit:' | head -1 | sed 's/^[^:]*:\s*//' | tr -d "\"' ")
            VLLM_HASH=$(echo "$RAW" | grep -E '^\s*vllm_commit:' | head -1 | sed 's/^[^:]*:\s*//' | tr -d "\"' ")
            FLASHINFER_HASH=$(echo "$RAW" | grep -E '^\s*flashinfer_commit:' | head -1 | sed 's/^[^:]*:\s*//' | tr -d "\"' ")
            echo "repo_commit=${REPO_COMMIT}" >> "$GITHUB_OUTPUT"
            echo "vllm_hash=${VLLM_HASH}" >> "$GITHUB_OUTPUT"
            echo "flashinfer_hash=${FLASHINFER_HASH}" >> "$GITHUB_OUTPUT"
            echo "Extracted: commit=${REPO_COMMIT} vllm=${VLLM_HASH} flashinfer=${FLASHINFER_HASH}"
          fi

      - name: Re-layer image (split dist-packages)
        run: |
          docker build -f $GITHUB_WORKSPACE/Dockerfile.relayer \
            --build-arg SOURCE_IMAGE=vllm-node \
            --build-arg BASE_IMAGE=${{ steps.base.outputs.image }} \
            --build-arg SPARKRUN_REPO_COMMIT=${{ steps.metadata.outputs.repo_commit }} \
            --build-arg SPARKRUN_VLLM_HASH=${{ steps.metadata.outputs.vllm_hash }} \
            --build-arg SPARKRUN_FLASHINFER_HASH=${{ steps.metadata.outputs.flashinfer_hash }} \
            --build-arg SPARKRUN_BUILD_FLAGS=${{ matrix.build_flags }} \
            -t ${{ env.IMAGE_BASE }}-${{ matrix.name }}:${{ needs.compute-tag.outputs.tag }} \
            $GITHUB_WORKSPACE

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push
        run: |
          IMAGE="${{ env.IMAGE_BASE }}-${{ matrix.name }}"
          FULL_TAG="${{ needs.compute-tag.outputs.tag }}"
          DATE_TAG="${{ needs.compute-tag.outputs.date_tag }}"

          docker tag "${IMAGE}:${FULL_TAG}" "${IMAGE}:${DATE_TAG}"
          docker tag "${IMAGE}:${FULL_TAG}" "${IMAGE}:latest"
          docker push "${IMAGE}:${FULL_TAG}"
          docker push "${IMAGE}:${DATE_TAG}"
          docker push "${IMAGE}:latest"

      - name: Save build-index entry
        run: |
          mkdir -p /tmp/build-index
          cat > /tmp/build-index/${{ matrix.name }}.json << EOF
          {
            "tag": "${{ needs.compute-tag.outputs.tag }}",
            "variant": "${{ matrix.name }}",
            "repo_commit": "${{ steps.metadata.outputs.repo_commit }}",
            "vllm_hash": "${{ steps.metadata.outputs.vllm_hash }}",
            "flashinfer_hash": "${{ steps.metadata.outputs.flashinfer_hash }}",
            "build_flags": "${{ matrix.build_flags }}",
            "pushed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          sed -i 's/^          //' /tmp/build-index/${{ matrix.name }}.json

      - name: Upload build-index entry
        uses: actions/upload-artifact@v4
        with:
          name: build-index-${{ matrix.name }}
          path: /tmp/build-index/${{ matrix.name }}.json

      - name: Compute wheel manifest
        if: matrix.name == 'nightly'
        id: wheel-check
        run: |
          WHEELS_DIR="/tmp/spark-vllm-docker/wheels"
          MANIFEST="{}"

          if [ -d "$WHEELS_DIR" ] && ls "$WHEELS_DIR"/*.whl 1>/dev/null 2>&1; then
            for whl in "$WHEELS_DIR"/*.whl; do
              FNAME=$(basename "$whl")
              HASH=$(sha256sum "$whl" | awk '{print $1}')
              MANIFEST=$(echo "$MANIFEST" | jq --arg k "$FNAME" --arg v "$HASH" '. + {($k): $v}')
            done
          else
            echo "WARNING: No wheel files found in $WHEELS_DIR"
            echo "wheels_changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Compare against stored state
          STORED=$(jq -cS '.wheels' wheels-state.json 2>/dev/null || echo '{}')
          CURRENT=$(echo "$MANIFEST" | jq -cS '.')

          if [ "$STORED" = "$CURRENT" ]; then
            echo "Wheels unchanged"
            echo "wheels_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Wheels changed!"
            echo "  stored:  $STORED"
            echo "  current: $CURRENT"
            echo "wheels_changed=true" >> "$GITHUB_OUTPUT"
          fi

          # Save manifest for later steps
          echo "$MANIFEST" > /tmp/wheels-manifest.json

      - name: Build and push wheels carrier
        if: matrix.name == 'nightly' && steps.wheel-check.outputs.wheels_changed == 'true'
        run: |
          IMAGE="${{ env.IMAGE_BASE }}-nightly-wheels"
          FULL_TAG="${{ needs.compute-tag.outputs.tag }}"
          DATE_TAG="${{ needs.compute-tag.outputs.date_tag }}"

          docker build -f $GITHUB_WORKSPACE/Dockerfile.wheels-carrier \
            -t "${IMAGE}:${FULL_TAG}" \
            /tmp/spark-vllm-docker/wheels/

          docker tag "${IMAGE}:${FULL_TAG}" "${IMAGE}:${DATE_TAG}"
          docker tag "${IMAGE}:${FULL_TAG}" "${IMAGE}:latest"
          docker push "${IMAGE}:${FULL_TAG}"
          docker push "${IMAGE}:${DATE_TAG}"
          docker push "${IMAGE}:latest"

      - name: Save wheels-state entry
        if: matrix.name == 'nightly' && steps.wheel-check.outputs.wheels_changed == 'true'
        run: |
          MANIFEST=$(cat /tmp/wheels-manifest.json)
          jq -n --argjson wheels "$MANIFEST" \
                --arg last_tag "${{ needs.compute-tag.outputs.tag }}" \
                '{wheels: $wheels, last_tag: $last_tag}' > /tmp/wheels-state-new.json

      - name: Upload wheels-state entry
        if: matrix.name == 'nightly' && steps.wheel-check.outputs.wheels_changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: wheels-state-update
          path: /tmp/wheels-state-new.json

  # ──────────────────────────────────────────────────────────────────────
  # Job 4: Update upstream state and sequence after successful builds
  # ──────────────────────────────────────────────────────────────────────
  update-state:
    runs-on: ubuntu-latest
    needs: [ check-upstream, compute-tag, build-variant ]
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Download build-index entries
        uses: actions/download-artifact@v4
        with:
          pattern: build-index-*
          path: /tmp/build-index-entries
          merge-multiple: true

      - name: Download wheels-state update
        uses: actions/download-artifact@v4
        with:
          name: wheels-state-update
          path: /tmp/wheels-state-entry
        continue-on-error: true

      - name: Update wheels-state.json
        run: |
          if [ -f /tmp/wheels-state-entry/wheels-state-new.json ]; then
            cp /tmp/wheels-state-entry/wheels-state-new.json wheels-state.json
            echo "Updated wheels-state.json"
          else
            echo "No wheels-state update artifact — skipping"
          fi

      - name: Update build-index.json
        run: |
          # Initialize build-index.json if it doesn't exist
          if [ ! -f build-index.json ]; then
            echo '[]' > build-index.json
          fi

          # Append new entries from each variant
          for entry_file in /tmp/build-index-entries/*.json; do
            if [ -f "$entry_file" ]; then
              # Merge entry into the existing array
              jq --slurpfile new "$entry_file" '. + $new' build-index.json > build-index.tmp
              mv build-index.tmp build-index.json
              echo "Added entry from $entry_file"
            fi
          done

          # Keep only the last 100 entries to bound file size
          jq '.[-100:]' build-index.json > build-index.tmp
          mv build-index.tmp build-index.json

          echo "build-index.json now has $(jq length build-index.json) entries"

      - name: Update state files
        run: |
          NEW_TAG="${{ needs.compute-tag.outputs.tag }}"

          # Write upstream-state.json
          cat > upstream-state.json << 'STATEEOF'
          {
            "main_sha": "${{ needs.check-upstream.outputs.main_sha }}",
            "latest_release": "${{ needs.check-upstream.outputs.latest_release }}",
            "known_tags": ${{ needs.check-upstream.outputs.known_tags }}
          }
          STATEEOF

          # Clean up indentation from heredoc
          sed -i 's/^          //' upstream-state.json

          # Write sequence.txt
          echo "${NEW_TAG}" > sequence.txt

      - name: Commit and push state
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # Pull latest, but fail if someone else changed our state files
          git fetch origin main
          CHANGED_FILES=$(git diff --name-only HEAD..origin/main)
          if echo "$CHANGED_FILES" | grep -qE '^(upstream-state\.json|sequence\.txt|build-index\.json|wheels-state\.json)$'; then
            echo "ERROR: State files were modified on remote — aborting to avoid conflict."
            exit 1
          fi

          # Stash our state file changes, rebase onto latest remote, then re-apply
          git stash
          git rebase origin/main
          git stash pop

          git add upstream-state.json sequence.txt build-index.json wheels-state.json
          git commit -m "Build ${{ needs.compute-tag.outputs.tag }}: track upstream state" || exit 0
          git push
