name: Mirror DGX vLLM Containers

on:
  schedule:
    - cron: "30 * * * *"  # Every hour at :30 — polls upstream for a new/redone image
  workflow_dispatch:          # Manual trigger (always forces a mirror)

env:
  IMAGE_BASE: ghcr.io/spark-arena/dgx-vllm-eugr
  SOURCE_IMAGE: docker.io/eugr/spark-vllm

concurrency:
  group: mirror
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Job 1: Check upstream for a new image (by digest) + track GitHub state
  # ──────────────────────────────────────────────────────────────────────
  check-upstream:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.compare.outputs.changed }}
      digest: ${{ steps.fetch.outputs.digest }}
      source_tag: ${{ steps.fetch.outputs.source_tag }}
      main_sha: ${{ steps.fetch.outputs.main_sha }}
      latest_release: ${{ steps.fetch.outputs.latest_release }}
      known_tags: ${{ steps.fetch.outputs.known_tags }}
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Install skopeo
        run: sudo apt-get update && sudo apt-get install -y skopeo

      - name: Read stored state
        id: stored
        run: |
          echo "digest=$(jq -r '.last_digest // ""' upstream-state.json)" >> "$GITHUB_OUTPUT"
          echo "main_sha=$(jq -r '.main_sha // ""' upstream-state.json)" >> "$GITHUB_OUTPUT"
          echo "latest_release=$(jq -r '.latest_release // ""' upstream-state.json)" >> "$GITHUB_OUTPUT"
          echo "known_tags=$(jq -c '.known_tags // []' upstream-state.json)" >> "$GITHUB_OUTPUT"

      - name: Fetch current upstream state
        id: fetch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Manifest digest of eugr's :latest — this is what we mirror and compare on.
          DIGEST=$(skopeo inspect --no-tags "docker://${SOURCE_IMAGE}:latest" | jq -r '.Digest')
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Current upstream digest: ${DIGEST}"

          # Resolve the dated tag that matches :latest (record-keeping only), via the
          # public Docker Hub API — no auth needed.
          TAGS_JSON=$(curl -fsSL "https://hub.docker.com/v2/repositories/eugr/spark-vllm/tags?page_size=100" || echo '{}')
          SOURCE_TAG=$(echo "$TAGS_JSON" | jq -r --arg d "$DIGEST" \
            'first(.results[]? | select(.name != "latest" and .digest == $d) | .name) // ""')
          echo "source_tag=${SOURCE_TAG}" >> "$GITHUB_OUTPUT"
          echo "Matching source tag: ${SOURCE_TAG:-<none>}"

          # Supplementary GitHub state (source of truth for eugr's build inputs).
          MAIN_SHA=$(gh api repos/eugr/spark-vllm-docker/git/ref/heads/main --jq '.object.sha' 2>/dev/null || echo "")
          echo "main_sha=${MAIN_SHA}" >> "$GITHUB_OUTPUT"

          LATEST_RELEASE=$(gh api repos/eugr/spark-vllm-docker/releases/latest --jq '.tag_name' 2>/dev/null || echo "")
          echo "latest_release=${LATEST_RELEASE}" >> "$GITHUB_OUTPUT"

          KNOWN_TAGS=$(gh api repos/eugr/spark-vllm-docker/tags --paginate --jq '[.[].name]' 2>/dev/null || echo "[]")
          echo "known_tags=${KNOWN_TAGS}" >> "$GITHUB_OUTPUT"

      - name: Compare states
        id: compare
        run: |
          CHANGED="false"

          # workflow_dispatch always forces a mirror
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CHANGED="true"
            echo "Forced mirror via workflow_dispatch"
          fi

          # Primary trigger: the upstream image digest changed (new or redone nightly)
          if [ "${{ steps.stored.outputs.digest }}" != "${{ steps.fetch.outputs.digest }}" ]; then
            CHANGED="true"
            echo "Digest changed: ${{ steps.stored.outputs.digest }} -> ${{ steps.fetch.outputs.digest }}"
          fi

          # Supplementary: GitHub state drift (recorded even when it alone triggers)
          if [ "${{ steps.stored.outputs.main_sha }}" != "${{ steps.fetch.outputs.main_sha }}" ]; then
            CHANGED="true"
            echo "Main SHA changed: ${{ steps.stored.outputs.main_sha }} -> ${{ steps.fetch.outputs.main_sha }}"
          fi
          if [ "${{ steps.stored.outputs.latest_release }}" != "${{ steps.fetch.outputs.latest_release }}" ]; then
            CHANGED="true"
            echo "Latest release changed: ${{ steps.stored.outputs.latest_release }} -> ${{ steps.fetch.outputs.latest_release }}"
          fi
          if [ '${{ steps.stored.outputs.known_tags }}' != '${{ steps.fetch.outputs.known_tags }}' ]; then
            CHANGED="true"
            echo "Tags changed"
          fi

          echo "changed=${CHANGED}" >> "$GITHUB_OUTPUT"
          echo "Result: changed=${CHANGED}"

  # ──────────────────────────────────────────────────────────────────────
  # Job 2: Compute the next YYYYMMDDNN tag
  # ──────────────────────────────────────────────────────────────────────
  compute-tag:
    runs-on: ubuntu-latest
    needs: check-upstream
    if: needs.check-upstream.outputs.changed == 'true'
    outputs:
      tag: ${{ steps.compute.outputs.tag }}
      date_tag: ${{ steps.compute.outputs.date_tag }}
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Compute next tag
        id: compute
        run: |
          TODAY=$(TZ=US/Pacific date +%Y%m%d)
          LAST=$(cat sequence.txt | tr -d '[:space:]')
          LAST_DATE=${LAST:0:8}
          LAST_NN=${LAST:8:2}

          if [ "$LAST_DATE" = "$TODAY" ]; then
            NEXT_NN=$(printf '%02d' $((10#$LAST_NN + 1)))
          else
            NEXT_NN="01"
          fi

          TAG="${TODAY}${NEXT_NN}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "date_tag=${TODAY}" >> "$GITHUB_OUTPUT"
          echo "Next tag: ${TAG}"

  # ──────────────────────────────────────────────────────────────────────
  # Job 3: Mirror eugr's image (add provenance labels) + publish tags
  # ──────────────────────────────────────────────────────────────────────
  mirror:
    runs-on: ubuntu-latest
    needs: [ check-upstream, compute-tag ]
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /usr/share/swift /opt/hostedtoolcache
          sudo docker system prune -af
          df -h /

      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image and extract build metadata
        id: metadata
        env:
          DIGEST: ${{ needs.check-upstream.outputs.digest }}
        run: |
          # Pull the pinned digest (arm64) and copy out the authoritative metadata file
          # WITHOUT executing the image (create/cp work cross-arch on x86).
          docker pull --platform linux/arm64 "${SOURCE_IMAGE}@${DIGEST}"
          CID=$(docker create "${SOURCE_IMAGE}@${DIGEST}")
          docker cp "${CID}:/workspace/build-metadata.yaml" ./build-metadata.yaml || echo "" > ./build-metadata.yaml
          docker rm "${CID}" >/dev/null

          echo "--- build-metadata.yaml ---"
          cat ./build-metadata.yaml || true

          RAW=$(cat ./build-metadata.yaml)
          parse() { echo "$RAW" | grep -E "^\s*$1:" | head -1 | sed 's/^[^:]*:\s*//' | tr -d "\"' "; }
          REPO_COMMIT=$(parse build_script_commit)
          VLLM_HASH=$(parse vllm_commit)
          VLLM_VERSION=$(parse vllm_version)
          FLASHINFER_HASH=$(parse flashinfer_commit)

          {
            echo "repo_commit=${REPO_COMMIT}"
            echo "vllm_hash=${VLLM_HASH}"
            echo "vllm_version=${VLLM_VERSION}"
            echo "flashinfer_hash=${FLASHINFER_HASH}"
          } >> "$GITHUB_OUTPUT"
          echo "Extracted: repo=${REPO_COMMIT} vllm=${VLLM_HASH} (${VLLM_VERSION}) flashinfer=${FLASHINFER_HASH}"

      - name: Build labeled image
        env:
          DIGEST: ${{ needs.check-upstream.outputs.digest }}
        run: |
          docker build -f "$GITHUB_WORKSPACE/Dockerfile.mirror" \
            --platform linux/arm64 \
            --build-arg SOURCE_IMAGE="${SOURCE_IMAGE}@${DIGEST}" \
            --build-arg SPARKRUN_REPO_COMMIT="${{ steps.metadata.outputs.repo_commit }}" \
            --build-arg SPARKRUN_VLLM_HASH="${{ steps.metadata.outputs.vllm_hash }}" \
            --build-arg SPARKRUN_VLLM_VERSION="${{ steps.metadata.outputs.vllm_version }}" \
            --build-arg SPARKRUN_FLASHINFER_HASH="${{ steps.metadata.outputs.flashinfer_hash }}" \
            --build-arg SPARKRUN_BUILD_FLAGS="" \
            --build-arg SPARKRUN_SOURCE_IMAGE="${SOURCE_IMAGE}" \
            --build-arg SPARKRUN_SOURCE_DIGEST="${DIGEST}" \
            --build-arg SPARKRUN_SOURCE_TAG="${{ needs.check-upstream.outputs.source_tag }}" \
            -t "${IMAGE_BASE}-nightly:${{ needs.compute-tag.outputs.tag }}" \
            "$GITHUB_WORKSPACE"

      - name: Tag and push (nightly + tf5 alias, 3 tags each)
        id: push
        run: |
          BUILT="${IMAGE_BASE}-nightly:${{ needs.compute-tag.outputs.tag }}"
          FULL_TAG="${{ needs.compute-tag.outputs.tag }}"
          DATE_TAG="${{ needs.compute-tag.outputs.date_tag }}"

          for IMG in "${IMAGE_BASE}-nightly" "${IMAGE_BASE}-nightly-tf5"; do
            for T in "$FULL_TAG" "$DATE_TAG" latest; do
              docker tag "$BUILT" "${IMG}:${T}"
              docker push "${IMG}:${T}"
            done
          done

          # Our published manifest digest (diverges from eugr's — we added labels).
          IMAGE_DIGEST=$(docker inspect --format='{{range .RepoDigests}}{{println .}}{{end}}' "$BUILT" \
            | grep "${IMAGE_BASE}-nightly@" | head -1 | sed 's/.*@//')
          echo "image_digest=${IMAGE_DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Published image digest: ${IMAGE_DIGEST}"

      - name: Save build-index entries
        env:
          DIGEST: ${{ needs.check-upstream.outputs.digest }}
        run: |
          mkdir -p /tmp/build-index
          PUSHED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          for VARIANT in nightly nightly-tf5; do
            jq -n \
              --arg tag "${{ needs.compute-tag.outputs.tag }}" \
              --arg variant "$VARIANT" \
              --arg image_digest "${{ steps.push.outputs.image_digest }}" \
              --arg source_digest "${DIGEST}" \
              --arg source_tag "${{ needs.check-upstream.outputs.source_tag }}" \
              --arg repo_commit "${{ steps.metadata.outputs.repo_commit }}" \
              --arg vllm_hash "${{ steps.metadata.outputs.vllm_hash }}" \
              --arg vllm_version "${{ steps.metadata.outputs.vllm_version }}" \
              --arg flashinfer_hash "${{ steps.metadata.outputs.flashinfer_hash }}" \
              --arg pushed_at "$PUSHED_AT" \
              '{tag: $tag, variant: $variant, image_digest: $image_digest,
                source_digest: $source_digest, source_tag: $source_tag,
                repo_commit: $repo_commit, vllm_hash: $vllm_hash,
                vllm_version: $vllm_version, flashinfer_hash: $flashinfer_hash,
                build_flags: "", pushed_at: $pushed_at}' \
              > "/tmp/build-index/${VARIANT}.json"
          done

      - name: Upload build-index entries
        uses: actions/upload-artifact@v4
        with:
          name: build-index
          path: /tmp/build-index/*.json

      - name: Download upstream wheels
        id: wheels-fetch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/wheels
          # eugr publishes the prebuilt wheels as GitHub release assets.
          for REL in prebuilt-vllm-current prebuilt-flashinfer-current; do
            gh release download "$REL" -R eugr/spark-vllm-docker \
              --pattern '*.whl' --dir /tmp/wheels --clobber || \
              echo "No wheels in release $REL (or download failed) — continuing"
          done
          if ls /tmp/wheels/*.whl >/dev/null 2>&1; then
            echo "have_wheels=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_wheels=false" >> "$GITHUB_OUTPUT"
            echo "WARNING: no wheels downloaded"
          fi

      - name: Compute wheel manifest
        if: steps.wheels-fetch.outputs.have_wheels == 'true'
        id: wheel-check
        run: |
          MANIFEST="{}"
          for whl in /tmp/wheels/*.whl; do
            FNAME=$(basename "$whl")
            HASH=$(sha256sum "$whl" | awk '{print $1}')
            MANIFEST=$(echo "$MANIFEST" | jq --arg k "$FNAME" --arg v "$HASH" '. + {($k): $v}')
          done

          STORED=$(jq -cS '.wheels' wheels-state.json 2>/dev/null || echo '{}')
          CURRENT=$(echo "$MANIFEST" | jq -cS '.')

          if [ "$STORED" = "$CURRENT" ]; then
            echo "Wheels unchanged"
            echo "wheels_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Wheels changed!"
            echo "wheels_changed=true" >> "$GITHUB_OUTPUT"
          fi
          echo "$MANIFEST" > /tmp/wheels-manifest.json

      - name: Build and push wheels carrier
        if: steps.wheel-check.outputs.wheels_changed == 'true'
        run: |
          IMAGE="${IMAGE_BASE}-nightly-wheels"
          FULL_TAG="${{ needs.compute-tag.outputs.tag }}"
          DATE_TAG="${{ needs.compute-tag.outputs.date_tag }}"

          docker build -f "$GITHUB_WORKSPACE/Dockerfile.wheels-carrier" \
            -t "${IMAGE}:${FULL_TAG}" \
            /tmp/wheels/

          docker tag "${IMAGE}:${FULL_TAG}" "${IMAGE}:${DATE_TAG}"
          docker tag "${IMAGE}:${FULL_TAG}" "${IMAGE}:latest"
          docker push "${IMAGE}:${FULL_TAG}"
          docker push "${IMAGE}:${DATE_TAG}"
          docker push "${IMAGE}:latest"

      - name: Save wheels-state entry
        if: steps.wheel-check.outputs.wheels_changed == 'true'
        run: |
          MANIFEST=$(cat /tmp/wheels-manifest.json)
          jq -n --argjson wheels "$MANIFEST" \
                --arg last_tag "${{ needs.compute-tag.outputs.tag }}" \
                '{wheels: $wheels, last_tag: $last_tag}' > /tmp/wheels-state-new.json

      - name: Upload wheels-state entry
        if: steps.wheel-check.outputs.wheels_changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: wheels-state-update
          path: /tmp/wheels-state-new.json

  # ──────────────────────────────────────────────────────────────────────
  # Job 4: Update state files and commit after a successful mirror
  # ──────────────────────────────────────────────────────────────────────
  update-state:
    runs-on: ubuntu-latest
    needs: [ check-upstream, compute-tag, mirror ]
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Download build-index entries
        uses: actions/download-artifact@v4
        with:
          name: build-index
          path: /tmp/build-index-entries

      - name: Download wheels-state update
        uses: actions/download-artifact@v4
        with:
          name: wheels-state-update
          path: /tmp/wheels-state-entry
        continue-on-error: true

      - name: Update wheels-state.json
        run: |
          if [ -f /tmp/wheels-state-entry/wheels-state-new.json ]; then
            cp /tmp/wheels-state-entry/wheels-state-new.json wheels-state.json
            echo "Updated wheels-state.json"
          else
            echo "No wheels-state update artifact — skipping"
          fi

      - name: Update build-index.json
        run: |
          if [ ! -f build-index.json ]; then
            echo '[]' > build-index.json
          fi

          for entry_file in /tmp/build-index-entries/*.json; do
            if [ -f "$entry_file" ]; then
              jq --slurpfile new "$entry_file" '. + $new' build-index.json > build-index.tmp
              mv build-index.tmp build-index.json
              echo "Added entry from $entry_file"
            fi
          done

          # Keep only the last 100 entries to bound file size
          jq '.[-100:]' build-index.json > build-index.tmp
          mv build-index.tmp build-index.json
          echo "build-index.json now has $(jq length build-index.json) entries"

      - name: Update state files
        run: |
          NEW_TAG="${{ needs.compute-tag.outputs.tag }}"

          cat > upstream-state.json << 'STATEEOF'
          {
            "last_digest": "${{ needs.check-upstream.outputs.digest }}",
            "source_tag": "${{ needs.check-upstream.outputs.source_tag }}",
            "main_sha": "${{ needs.check-upstream.outputs.main_sha }}",
            "latest_release": "${{ needs.check-upstream.outputs.latest_release }}",
            "known_tags": ${{ needs.check-upstream.outputs.known_tags }}
          }
          STATEEOF
          sed -i 's/^          //' upstream-state.json

          echo "${NEW_TAG}" > sequence.txt

      - name: Commit and push state
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git fetch origin main
          CHANGED_FILES=$(git diff --name-only HEAD..origin/main)
          if echo "$CHANGED_FILES" | grep -qE '^(upstream-state\.json|sequence\.txt|build-index\.json|wheels-state\.json)$'; then
            echo "ERROR: State files were modified on remote — aborting to avoid conflict."
            exit 1
          fi

          git stash
          git rebase origin/main
          git stash pop

          git add upstream-state.json sequence.txt build-index.json wheels-state.json
          git commit -m "Mirror ${{ needs.compute-tag.outputs.tag }}: eugr digest ${{ needs.check-upstream.outputs.digest }}" || exit 0
          git push
